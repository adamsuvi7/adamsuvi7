<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="300">
  <defs>
    <style>
      .bg { fill: #0D1117; }

      .st-plum { fill: #6D2D43; opacity: 0.9; }
      .st-curry { fill: #D28C5D; opacity: 0.9; }
      .st-cream { fill: #EFE1D1; opacity: 0.8; }

      .st-outline-cream { fill: none; stroke: #EFE1D1; stroke-width: 4; opacity: 0.6; }
      .st-outline-curry { fill: none; stroke: #D28C5D; stroke-width: 5; opacity: 0.7; }
      .st-outline-plum { fill: none; stroke: #6D2D43; stroke-width: 3; opacity: 0.5; }

      @keyframes float1 {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(15deg); }
        100% { transform: translateY(0) rotate(0deg); }
      }

      @keyframes float2 {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(25px) rotate(-15deg); }
        100% { transform: translateY(0) rotate(0deg); }
      }

      @keyframes scalePulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.4); opacity: 1; }
      }

      @keyframes moveX {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(40px); }
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.8) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(80px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes shimmer {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }

      @keyframes dashMove {
        100% { stroke-dashoffset: -100; }
      }

      .anim-float-1 { animation: float1 9s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: center; }
      .anim-float-2 { animation: float2 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: center; animation-delay: -3s; }
      .anim-pulse { animation: scalePulse 7s ease-in-out infinite; transform-origin: center; }
      .anim-move { animation: moveX 15s ease-in-out infinite; }
      .anim-spin { animation: spin 20s linear infinite; transform-origin: center; }
      .anim-dash { animation: dashMove 8s linear infinite; }
      .anim-shimmer { animation: shimmer 3s ease-in-out infinite; }

      .title {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 52px;
        font-weight: 800;
        fill: #EFE1D1;
        opacity: 0;
        animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
      }
      .subtitle {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 22px;
        font-weight: 600;
        fill: #D28C5D;
        opacity: 0;
        animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
      }
      .tagline {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #8B949E;
        opacity: 0;
        animation: popIn 1.2s ease 0.8s forwards;
      }
      .line {
        stroke: #D28C5D;
        stroke-width: 4;
        stroke-linecap: round;
        opacity: 0;
        animation: slideInRight 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
      }

      .dot { fill: #EFE1D1; opacity: 0.03; }
    </style>

    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" class="dot"/>
    </pattern>

    <!-- Gradient for glow effects -->
    <radialGradient id="glowPlum" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6D2D43" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6D2D43" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCurry" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D28C5D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D28C5D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="12"/>
  <rect width="100%" height="100%" fill="url(#dotGrid)" rx="12"/>

  <!-- Ambient Glow Left -->
  <circle cx="120" cy="140" r="200" fill="url(#glowPlum)" class="anim-pulse"/>

  <!-- Ambient Glow Right -->
  <circle cx="850" cy="150" r="220" fill="url(#glowCurry)" class="anim-pulse" style="animation-delay: -3s;"/>

  <!-- Left Side Geometries -->
  <g class="anim-float-1" transform="translate(100, 110)">
    <circle cx="0" cy="0" r="60" class="st-outline-curry anim-dash" stroke-dasharray="15 15"/>
    <rect x="-35" y="-35" width="70" height="70" rx="14" class="st-curry" transform="rotate(45)" opacity="0.25"/>
  </g>

  <g class="anim-float-2" transform="translate(200, 250)">
    <polygon points="0,-35 30,18 -30,18" class="st-outline-cream" transform="rotate(20)"/>
  </g>

  <g class="anim-float-1" style="animation-delay: -5s;" transform="translate(50, 230)">
    <rect x="-15" y="-15" width="30" height="30" rx="6" class="st-outline-plum" transform="rotate(30)"/>
  </g>

  <!-- Right Side Geometries -->
  <g class="anim-move">
    <g class="anim-float-2" transform="translate(850, 140)">
      <rect x="-50" y="-50" width="100" height="100" rx="18" class="st-plum" transform="rotate(30)" opacity="0.2"/>
      <circle cx="0" cy="0" r="75" class="st-outline-cream anim-dash" stroke-dasharray="20 10" style="animation-direction: reverse;"/>
      <polygon points="0,-20 17,12 -17,12" class="st-cream" transform="translate(55, -70) rotate(45)" opacity="0.5"/>
    </g>
  </g>

  <g class="anim-float-1" transform="translate(750, 45)">
    <rect x="-18" y="-18" width="36" height="36" rx="7" class="st-outline-curry" transform="rotate(15)"/>
  </g>

  <g class="anim-float-2" style="animation-delay: -7s;" transform="translate(950, 260)">
    <circle cx="0" cy="0" r="20" class="st-outline-plum"/>
  </g>

  <!-- Particles -->
  <g class="anim-pulse">
    <circle cx="50" cy="45" r="5" class="st-curry"/>
    <circle cx="400" cy="265" r="6" class="st-cream" opacity="0.5"/>
    <circle cx="920" cy="50" r="4" class="st-plum"/>
    <circle cx="650" cy="35" r="3" class="st-outline-cream"/>
  </g>

  <g class="anim-shimmer">
    <circle cx="300" cy="40" r="2" fill="#EFE1D1" opacity="0.4"/>
    <circle cx="700" cy="270" r="3" fill="#D28C5D" opacity="0.3"/>
    <circle cx="500" cy="20" r="2" fill="#6D2D43" opacity="0.5"/>
  </g>

  <!-- Text Content -->
  <text x="50%" y="115" dominant-baseline="middle" text-anchor="middle" class="title">Adam Suvi, S.Si., C.DA</text>
  <line x1="38%" y1="160" x2="62%" y2="160" class="line"/>
  <text x="50%" y="200" dominant-baseline="middle" text-anchor="middle" class="subtitle">Data Enthusiast &amp; Data Analyst</text>
  <text x="50%" y="240" dominant-baseline="middle" text-anchor="middle" class="tagline">SQL · Python · Power BI · Tableau · TensorFlow</text>

</svg>
