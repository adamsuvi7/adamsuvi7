<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .bg { fill: #2B3754; } 
      
      .st-plum { fill: #6D2D43; opacity: 0.9; }
      .st-curry { fill: #D28C5D; opacity: 0.9; }
      .st-cream { fill: #EFE1D1; opacity: 0.8; }
      .st-mid { fill: #2B3754; opacity: 0.9; }

      .st-outline-cream { fill: none; stroke: #EFE1D1; stroke-width: 4; opacity: 0.6; }
      .st-outline-curry { fill: none; stroke: #D28C5D; stroke-width: 5; opacity: 0.7; }
      .st-outline-plum { fill: none; stroke: #6D2D43; stroke-width: 3; opacity: 0.5; }

      @keyframes float1 {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(15deg); }
        100% { transform: translateY(0) rotate(0deg); }
      }
      
      @keyframes float2 {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(25px) rotate(-15deg); }
        100% { transform: translateY(0) rotate(0deg); }
      }

      @keyframes scalePulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.4); opacity: 1; }
      }

      @keyframes moveX {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(40px); }
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.8) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(80px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-80px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }
      
      .anim-float-1 { animation: float1 9s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: center; }
      .anim-float-2 { animation: float2 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: center; animation-delay: -3s; }
      .anim-pulse { animation: scalePulse 7s ease-in-out infinite; transform-origin: center; }
      .anim-move { animation: moveX 15s ease-in-out infinite; }
      .anim-spin { animation: spin 20s linear infinite; transform-origin: center; }

      .title { 
        font-family: 'Outfit', sans-serif; 
        font-size: 58px; 
        font-weight: 800; 
        fill: #EFE1D1; 
        opacity: 0;
        animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
      }
      .subtitle { 
        font-family: 'Outfit', sans-serif; 
        font-size: 26px; 
        font-weight: 600; 
        fill: #D28C5D; 
        opacity: 0; 
        animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards; 
      }
      .line { 
        stroke: #6D2D43; 
        stroke-width: 6; 
        stroke-linecap: round; 
        opacity: 0;
        animation: slideInRight 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
      }
      
      .dot { fill: #EFE1D1; opacity: 0.05; }
    </style>
    
    <pattern id="dotGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" class="dot"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="15"/>
  <rect width="100%" height="100%" fill="url(#dotGrid)" rx="15"/>

  <!-- Left Side Background Geometries -->
  <g class="anim-float-1" transform="translate(100, 100)">
    <circle cx="0" cy="0" r="140" class="st-plum" style="opacity: 0.15; filter: blur(30px);" />
    <circle cx="0" cy="0" r="70" class="st-outline-curry" stroke-dasharray="15 15" class="anim-spin" />
    <rect x="-40" y="-40" width="80" height="80" rx="15" class="st-curry" transform="rotate(45)" opacity="0.4" />
  </g>

  <g class="anim-float-2" transform="translate(200, 250)">
    <polygon points="0,-40 35,20 -35,20" class="st-outline-cream" transform="rotate(20)" />
  </g>

  <!-- Right Side Background Geometries -->
  <g class="anim-move">
    <g class="anim-float-2" transform="translate(850, 150)">
      <circle cx="0" cy="0" r="180" class="st-curry" style="opacity: 0.15; filter: blur(40px);" />
      <rect x="-60" y="-60" width="120" height="120" rx="20" class="st-plum" transform="rotate(30)" opacity="0.3" />
      <circle cx="0" cy="0" r="90" class="st-outline-cream" stroke-dasharray="20 10" class="anim-spin" style="animation-direction: reverse;" />
      <polygon points="0,-25 20,15 -20,15" class="st-cream" transform="translate(60, -80) rotate(45)" />
    </g>
  </g>
  
  <g class="anim-float-1" transform="translate(750, 50)">
    <rect x="-20" y="-20" width="40" height="40" rx="8" class="st-outline-curry" transform="rotate(15)" />
  </g>

  <!-- Smaller particles -->
  <g class="anim-pulse">
    <circle cx="50" cy="50" r="6" class="st-curry" />
    <circle cx="400" cy="260" r="8" class="st-cream" />
    <circle cx="920" cy="260" r="10" class="st-plum" />
    <circle cx="650" cy="40" r="5" class="st-outline-cream" />
  </g>

  <!-- Text Content -->
  <text x="50%" y="130" dominant-baseline="middle" text-anchor="middle" class="title">Adam Suvi, S.Si., C.DA</text>
  <line x1="42%" y1="180" x2="58%" y2="180" class="line" />
  <text x="50%" y="220" dominant-baseline="middle" text-anchor="middle" class="subtitle">Data Enthusiast &amp; Data Analyst</text>

</svg>
